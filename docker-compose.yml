services:
  mathapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: mathapi:${MATHAPI_TAG:-latest}
    ports:
      - "${MATHAPI_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    networks:
      - mathapi-net

networks:
  mathapi-net:
    driver: bridge
